<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENGWEI - Interactive Matrix</title>
    <style>
        /* ================= 基础重置 ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #030303; 
            color: #fff;
            overflow: hidden;
            cursor: none; 
        }

        /* ================= 1. 加载屏幕 ================= */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .progress-text {
            font-family: monospace;
            font-size: 14px;
            letter-spacing: 4px;
            color: #00ffcc;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .progress-bar {
            width: 200px; height: 1px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .progress-fill {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 0%;
            background: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
            transition: width 0.1s;
        }

        /* ================= 2. 动态 Canvas 矩阵层 ================= */
        #matrixCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            filter: blur(0.3px); 
        }

        /* 环境全局光晕 */
        #mouse-glow {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.05) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* ================= 3. 弹性星空球鼠标 ================= */
        #custom-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 10px #fff, 0 0 20px #00ffcc;
            transition: transform 0.1s; /* 点击时的微缩放 */
        }
        #custom-cursor.clicked {
            transform: translate(-50%, -50%) scale(0.5);
        }

        #cursor-trail {
            position: fixed;
            top: 0; left: 0;
            width: 36px; height: 36px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.3) 0%, rgba(0, 255, 204, 0.05) 50%, transparent 80%);
            border: 1px solid rgba(0, 255, 204, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9998;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3), inset 0 0 10px rgba(0, 255, 204, 0.2);
        }

        /* ================= 4. 主视觉中心内容 ================= */
        .center-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -45%);
            z-index: 5;
            text-align: center;
            opacity: 0;
            pointer-events: none; 
            transition: opacity 2s ease-out, transform 2s ease-out;
        }
        .center-content.loaded {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        h1 {
            font-size: 6vw;
            font-weight: 200;
            letter-spacing: 15px;
            margin-bottom: 20px;
            margin-right: -15px; 
            color: #ffffff;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
        }
        .subtitle {
            font-family: monospace;
            font-size: 13px;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* ================= 5. 悬浮 UI 层 ================= */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; 
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .ui-element {
            pointer-events: auto; 
            font-size: 12px;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            text-decoration: none;
            cursor: none; 
        }
        .ui-element:hover { 
            color: #00ffcc; 
            text-shadow: 0 0 10px rgba(0,255,204,0.8); 
        }

        .ui-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .ui-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
        .social-links { display: flex; gap: 30px; }

        .coordinates {
            position: absolute;
            bottom: 40px;
            right: 40px;
            text-align: right;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            font-family: monospace;
            pointer-events: none;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="progress-text" id="progress-text">SYS.INIT // 0%</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="custom-cursor"></div>
    <div id="cursor-trail"></div>

    <canvas id="matrixCanvas"></canvas>
    <div id="mouse-glow"></div>

    <div class="center-content" id="main-content">
        <h1>TENGWEI</h1>
        <div class="subtitle">Software Engineer | System Architect</div>
    </div>

    <div class="ui-layer">
        <div class="ui-top">
            <a href="https://www.tengwei.me" target="_blank" class="ui-element">WWW.TENGWEI.ME</a>
            <div></div> 
        </div>
        <div class="ui-bottom">
            <div class="social-links">
                <div class="ui-element">WECHAT: aamecc</div>
            </div>
        </div>
    </div>

    <div class="coordinates">
        DAT.STREAM // ACTIVE<br>
        POS: 45.4215° N, 75.6972° W<br>
        STATUS: SECURE
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ================= 1. 模拟加载器 =================
            let progress = 0;
            const progressText = document.getElementById('progress-text');
            const progressFill = document.getElementById('progress-fill');
            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('main-content');

            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 10) + 2; 
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => {
                            mainContent.classList.add('loaded');
                            setTimeout(() => { loader.remove(); }, 1000);
                        }, 300);
                    }, 400);
                }
                progressText.innerText = `SYS.INIT // ${progress}%`;
                progressFill.style.width = `${progress}%`;
            }, 40);

            // ================= 2. 鼠标与星空球逻辑 =================
            const cursor = document.getElementById('custom-cursor');
            const cursorTrail = document.getElementById('cursor-trail');
            const mouseGlow = document.getElementById('mouse-glow');
            
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let trailX = mouseX;
            let trailY = mouseY;
            
            let mouse = { x: null, y: null, radius: 180 };

            window.addEventListener('mousemove', (event) => {
                mouseX = event.clientX;
                mouseY = event.clientY;
                mouse.x = event.x;
                mouse.y = event.y;
                
                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';
                mouseGlow.style.left = mouseX + 'px';
                mouseGlow.style.top = mouseY + 'px';
            });

            window.addEventListener('mouseout', () => {
                mouse.x = undefined;
                mouse.y = undefined;
            });

            // ================= 3. Canvas 核心与波纹特效 =================
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particlesArray = [];
            let ripplesArray = []; // 波纹数组

            // 点击事件：触发波纹与粒子炸开
            window.addEventListener('mousedown', (e) => {
                // 鼠标圆点收缩反馈
                cursor.classList.add('clicked');
                
                // 1. 生成双重视觉波纹
                ripplesArray.push({ x: e.clientX, y: e.clientY, radius: 0, alpha: 1, speed: 5, width: 2 });
                setTimeout(() => {
                    ripplesArray.push({ x: e.clientX, y: e.clientY, radius: 0, alpha: 0.6, speed: 3.5, width: 1 });
                }, 100);

                // 2. 物理震荡：炸开周围的粒子
                for (let i = 0; i < particlesArray.length; i++) {
                    let p = particlesArray[i];
                    let dx = p.x - e.clientX;
                    let dy = p.y - e.clientY;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 250) {
                        let force = (250 - distance) / 250; // 越近受力越大
                        p.x += (dx / distance) * force * 80; // 瞬间推开
                        p.y += (dy / distance) * force * 80;
                    }
                }
            });

            window.addEventListener('mouseup', () => {
                cursor.classList.remove('clicked');
            });

            class Particle {
                constructor(x, y, directionX, directionY, size, color) {
                    this.x = x;
                    this.y = y;
                    this.directionX = directionX;
                    this.directionY = directionY;
                    this.size = size;
                    this.color = color;
                    this.baseX = this.x;
                    this.baseY = this.y;
                    this.density = (Math.random() * 30) + 1; 
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                update() {
                    if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                    if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                    // 鼠标日常排斥互动
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let maxDistance = mouse.radius;
                    let force = (maxDistance - distance) / maxDistance;
                    let directionX = forceDirectionX * force * this.density;
                    let directionY = forceDirectionY * force * this.density;

                    if (distance < mouse.radius && mouse.x !== undefined) {
                        this.x -= directionX;
                        this.y -= directionY;
                    } else {
                        if (this.x !== this.baseX) {
                            let dx = this.x - this.baseX;
                            this.x -= dx / 20; // 弹回速度调慢，让震荡后的恢复更平滑
                        }
                        if (this.y !== this.baseY) {
                            let dy = this.y - this.baseY;
                            this.y -= dy / 20;
                        }
                    }

                    this.x += this.directionX;
                    this.y += this.directionY;
                    this.draw();
                }
            }

            function init() {
                particlesArray = [];
                let numberOfParticles = (canvas.height * canvas.width) / 2500;
                for (let i = 0; i < numberOfParticles; i++) {
                    let size = (Math.random() * 1.5) + 0.5; 
                    let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                    let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                    let directionX = (Math.random() * 0.4) - 0.2; 
                    let directionY = (Math.random() * 0.4) - 0.2;
                    let color = 'rgba(0, 255, 204, 0.6)'; 

                    particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
                }
            }

            function connect() {
                let opacityValue = 1;
                for (let a = 0; a < particlesArray.length; a++) {
                    for (let b = a; b < particlesArray.length; b++) {
                        let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                     + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                        
                        if (distance < (canvas.width / 15) * (canvas.height / 15)) {
                            opacityValue = 1 - (distance / 8000);
                            ctx.strokeStyle = `rgba(0, 255, 204, ${opacityValue * 0.25})`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                            ctx.stroke();
                        }
                    }
                }
            }

            function drawRipples() {
                for (let i = 0; i < ripplesArray.length; i++) {
                    let r = ripplesArray[i];
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(0, 255, 204, ${r.alpha})`;
                    ctx.lineWidth = r.width;
                    ctx.stroke();

                    r.radius += r.speed; // 波纹扩散速度
                    r.alpha -= 0.015; // 波纹消散速度
                }
                // 清理已经透明的波纹
                ripplesArray = ripplesArray.filter(r => r.alpha > 0);
            }

            function animate() {
                requestAnimationFrame(animate);
                
                // 星空球弹性拖尾
                trailX += (mouseX - trailX) * 0.15;
                trailY += (mouseY - trailY) * 0.15;
                cursorTrail.style.left = trailX + 'px';
                cursorTrail.style.top = trailY + 'px';

                ctx.clearRect(0, 0, innerWidth, innerHeight);
                
                // 绘制粒子和连线
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                }
                connect();
                
                // 绘制波纹 (画在最上层)
                drawRipples();
            }

            window.addEventListener('resize', () => {
                canvas.width = innerWidth;
                canvas.height = innerHeight;
                init();
            });

            init();
            animate();
            
            // UI 交互反馈
            document.querySelectorAll('.ui-element').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorTrail.style.width = '50px';
                    cursorTrail.style.height = '50px';
                    cursorTrail.style.background = 'radial-gradient(circle, rgba(0, 255, 204, 0.5) 0%, rgba(0, 255, 204, 0.1) 60%, transparent 80%)';
                });
                el.addEventListener('mouseleave', () => {
                    cursorTrail.style.width = '36px';
                    cursorTrail.style.height = '36px';
                    cursorTrail.style.background = 'radial-gradient(circle, rgba(0, 255, 204, 0.3) 0%, rgba(0, 255, 204, 0.05) 50%, transparent 80%)';
                });
            });
        });
    </script>
</body>
</html>
