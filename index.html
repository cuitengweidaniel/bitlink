<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TENGWEI - Matrix Rain</title>
    <style>
        /* ================= 基础重置 ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #020202; /* 极深的背景，衬托代码雨 */
            color: #fff;
            overflow: hidden;
            cursor: none; 
        }

        /* ================= 1. 加载屏幕 ================= */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .progress-text {
            font-family: monospace;
            font-size: 14px;
            letter-spacing: 4px;
            color: #00ffcc;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .progress-bar {
            width: 200px; height: 1px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .progress-fill {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 0%;
            background: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
            transition: width 0.1s;
        }

        /* ================= 2. 画布层 ================= */
        #matrixCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            filter: blur(0.4px); /* 电影级的微弱柔光效果 */
        }

        /* 环境全局光晕 */
        #mouse-glow {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.08) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* ================= 3. 弹性星空球鼠标 ================= */
        #custom-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 10px #fff, 0 0 20px #00ffcc;
            transition: transform 0.1s; 
        }
        #custom-cursor.clicked {
            transform: translate(-50%, -50%) scale(0.4);
        }

        #cursor-trail {
            position: fixed;
            top: 0; left: 0;
            width: 36px; height: 36px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.3) 0%, rgba(0, 255, 204, 0.05) 50%, transparent 80%);
            border: 1px solid rgba(0, 255, 204, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9998;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3), inset 0 0 10px rgba(0, 255, 204, 0.2);
        }

        /* ================= 4. 主视觉中心内容 ================= */
        .center-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -45%);
            z-index: 5;
            text-align: center;
            opacity: 0;
            pointer-events: none; 
            transition: opacity 2s ease-out, transform 2s ease-out;
        }
        .center-content.loaded {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        h1 {
            font-size: 6vw;
            font-weight: 200;
            letter-spacing: 15px;
            margin-bottom: 20px;
            margin-right: -15px; 
            color: #ffffff;
            text-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 255, 204, 0.3);
        }
        .subtitle {
            font-family: monospace;
            font-size: 13px;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 50px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* ================= 5. 悬浮 UI 层 ================= */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; 
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .ui-element {
            pointer-events: auto; 
            font-size: 12px;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
            text-decoration: none;
            cursor: none; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .ui-element:hover { 
            color: #00ffcc; 
            text-shadow: 0 0 10px rgba(0,255,204,0.8); 
        }

        .ui-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .ui-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
        .social-links { display: flex; gap: 30px; }

        .coordinates {
            position: absolute;
            bottom: 40px;
            right: 40px;
            text-align: right;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            font-family: monospace;
            pointer-events: none;
            line-height: 1.5;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="progress-text" id="progress-text">MATRIX.INIT // 0%</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="custom-cursor"></div>
    <div id="cursor-trail"></div>

    <canvas id="matrixCanvas"></canvas>
    <div id="mouse-glow"></div>

    <div class="center-content" id="main-content">
        <h1>TENGWEI</h1>
        <div class="subtitle">Software Engineer | System Architect</div>
    </div>

    <div class="ui-layer">
        <div class="ui-top">
            <a href="https://www.tengwei.me" target="_blank" class="ui-element">WWW.TENGWEI.ME</a>
            <div></div> 
        </div>
        <div class="ui-bottom">
            <div class="social-links">
                <div class="ui-element">WECHAT: aamecc</div>
            </div>
        </div>
    </div>

    <div class="coordinates">
        SYS.MATRIX // OVERRIDE<br>
        POS: 45.4215° N, 75.6972° W<br>
        STATUS: ENCRYPTED
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ================= 1. 模拟加载器 =================
            let progress = 0;
            const progressText = document.getElementById('progress-text');
            const progressFill = document.getElementById('progress-fill');
            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('main-content');

            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 10) + 2; 
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => {
                            mainContent.classList.add('loaded');
                            setTimeout(() => { loader.remove(); }, 1000);
                        }, 300);
                    }, 400);
                }
                progressText.innerText = `MATRIX.INIT // ${progress}%`;
                progressFill.style.width = `${progress}%`;
            }, 40);

            // ================= 2. 鼠标与星空球逻辑 =================
            const cursor = document.getElementById('custom-cursor');
            const cursorTrail = document.getElementById('cursor-trail');
            const mouseGlow = document.getElementById('mouse-glow');
            
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let trailX = mouseX;
            let trailY = mouseY;

            window.addEventListener('mousemove', (event) => {
                mouseX = event.clientX;
                mouseY = event.clientY;
                
                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';
                mouseGlow.style.left = mouseX + 'px';
                mouseGlow.style.top = mouseY + 'px';
            });

            // ================= 3. 黑客帝国代码雨核心逻辑 =================
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');
            
            let width = canvas.width = window.innerWidth;
            let height = canvas.height = window.innerHeight;

            // 包含拉丁字母、数字和半角日文片假名（经典的矩阵字符集）
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*日ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍ'.split('');
            const fontSize = 14;
            let columns = Math.floor(width / fontSize);
            let drops = [];
            
            // 初始化每一列的坠落高度
            for (let x = 0; x < columns; x++) {
                drops[x] = Math.random() * -100; // 随机初始高度，错落有致
            }

            let ripplesArray = [];

            // 点击事件：产生波纹 + 代码雨干扰重置
            window.addEventListener('mousedown', (e) => {
                cursor.classList.add('clicked');
                
                // 1. 发射视觉波纹
                ripplesArray.push({ x: e.clientX, y: e.clientY, radius: 0, alpha: 1, speed: 6, width: 2 });
                setTimeout(() => {
                    ripplesArray.push({ x: e.clientX, y: e.clientY, radius: 0, alpha: 0.6, speed: 4, width: 1 });
                }, 100);

                // 2. 物理干扰：点击区域内的代码流被瞬间推回上方（数据逆流）
                for (let i = 0; i < drops.length; i++) {
                    let dropX = i * fontSize;
                    let dropY = drops[i] * fontSize;
                    let dx = e.clientX - dropX;
                    let dy = e.clientY - dropY;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 200) {
                        // 距离中心越近，被推回得越高
                        drops[i] -= Math.floor((200 - distance) / 5); 
                    }
                }
            });

            window.addEventListener('mouseup', () => {
                cursor.classList.remove('clicked');
            });

            // 绘制数字波纹
            function drawRipples() {
                for (let i = 0; i < ripplesArray.length; i++) {
                    let r = ripplesArray[i];
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(0, 255, 204, ${r.alpha})`;
                    ctx.lineWidth = r.width;
                    ctx.stroke();

                    r.radius += r.speed; 
                    r.alpha -= 0.012; // 波纹消散
                }
                ripplesArray = ripplesArray.filter(r => r.alpha > 0);
            }

            // 绘制代码雨
            function drawMatrix() {
                // 使用半透明黑色填充，保留上一帧的残影，形成拖尾效果
                ctx.fillStyle = 'rgba(2, 2, 2, 0.08)';
                ctx.fillRect(0, 0, width, height);

                ctx.font = fontSize + 'px monospace';
                ctx.textAlign = 'center';

                for (let i = 0; i < drops.length; i++) {
                    // 随机选择字符
                    const text = letters[Math.floor(Math.random() * letters.length)];
                    
                    let dropX = i * fontSize;
                    let dropY = drops[i] * fontSize;

                    // 计算鼠标与当前字符的距离，实现探照灯交互
                    let dx = mouseX - dropX;
                    let dy = mouseY - dropY;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 80) {
                        // 鼠标周围的字符高亮为白色，并略微抖动（黑客解码感）
                        ctx.fillStyle = '#ffffff';
                        dropX += (Math.random() - 0.5) * 2;
                    } else if (Math.random() > 0.98) {
                        // 极小概率随机闪烁成白色
                        ctx.fillStyle = '#ffffff';
                    } else {
                        // 默认的赛博青绿色
                        ctx.fillStyle = '#00ffcc';
                    }

                    // 绘制字符
                    ctx.fillText(text, dropX + fontSize/2, dropY);

                    // 触底或随机重置到顶部
                    if (dropY > height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    
                    // 下落速度控制
                    drops[i] += 0.9;
                }
            }

            // 动画主循环
            function animate() {
                // 限制帧率以获得经典的电影代码雨速度感
                setTimeout(() => {
                    requestAnimationFrame(animate);
                }, 30); // 调整此数值可改变下落整体速度 (毫秒)
                
                // 星空球弹性拖尾更新
                trailX += (mouseX - trailX) * 0.2;
                trailY += (mouseY - trailY) * 0.2;
                cursorTrail.style.left = trailX + 'px';
                cursorTrail.style.top = trailY + 'px';

                // 核心渲染
                drawMatrix();
                drawRipples();
            }

            // 窗口自适应
            window.addEventListener('resize', () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                columns = Math.floor(width / fontSize);
                // 补充新增列的数组长度
                while(drops.length < columns) {
                    drops.push(Math.random() * -100);
                }
            });

            // 启动
            animate();
            
            // UI 悬浮反馈保持不变
            document.querySelectorAll('.ui-element').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorTrail.style.width = '50px';
                    cursorTrail.style.height = '50px';
                    cursorTrail.style.background = 'radial-gradient(circle, rgba(0, 255, 204, 0.5) 0%, rgba(0, 255, 204, 0.1) 60%, transparent 80%)';
                });
                el.addEventListener('mouseleave', () => {
                    cursorTrail.style.width = '36px';
                    cursorTrail.style.height = '36px';
                    cursorTrail.style.background = 'radial-gradient(circle, rgba(0, 255, 204, 0.3) 0%, rgba(0, 255, 204, 0.05) 50%, transparent 80%)';
                });
            });
        });
    </script>
</body>
</html>
